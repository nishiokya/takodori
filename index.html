<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>二タコ採り — TAKO TORI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box}
  body{-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%;overscroll-behavior:none}
  button{touch-action:manipulation}
  /* 盤面を1画面に収める: 高さを可視ビューポートに固定し、はみ出しを隠す。
     これで boardWrap(flex:1) が残り高さに収まり、computeSize がタイルを縮めて全体が1画面に入る。 */
  .app-root{height:100vh;height:-webkit-fill-available;height:100dvh;overflow:hidden}
  /* スコア類は常に盤面の下に流す。操作リンク（遊び方/履歴/シェア）はヘッダー行の右側に置く。 */
  .stat-row{padding-top:1px;}
  /* 中くらい幅まで: ヘッダーがはみ出さないよう TAKO TORI 副題を隠し、操作リンクをアイコンのみに縮める。 */
  @media (max-width:600px){
    .brand-sub{display:none !important}
    #hdr-actions{gap:5px 7px !important;font-size:11px !important}
    #hdr-actions .lbl{display:none !important}
    #hdr-actions button{padding:6px 9px !important}
  }
  /* スマホ: ヘッダーは1行に収める。スコア類は盤面の下へ。 */
  @media (max-width:480px){
    .hdr{padding:6px 8px 2px !important;gap:4px 8px !important}
    .brand-emoji{font-size:18px !important}
    .brand-title{font-size:18px !important}
    .pill-group{padding:3px !important}
    .pill{padding:6px 10px !important;font-size:12px !important}
    .stat-row{gap:5px !important;justify-content:center;padding:1px 8px 0 !important;}
    .stat-card{min-width:0 !important;padding:3px 7px !important;border-radius:10px !important}
    .stat-label{font-size:9px !important;letter-spacing:.08em !important}
    .stat-val{font-size:15px !important}
    .stat-row{padding-bottom:max(2px,env(safe-area-inset-bottom)) !important}
    .stat-row .ctl{padding:5px 9px !important;font-size:12px !important}
  }
  @keyframes hintPulse{
    0%,100%{box-shadow:0 0 0 3px #0e7490,0 4px 10px rgba(0,0,0,.15);transform:translateY(0)}
    50%{box-shadow:0 0 0 6px #22b8cf,0 10px 20px rgba(14,116,144,.5);transform:translateY(-3px)}
  }
  /* ヒント: ペアのうち上/右側の1枚だけを大きく拡大して示す。 */
  @keyframes hintBig{
    0%,100%{transform:scale(1.28);box-shadow:0 0 0 3px #0e7490,0 8px 18px rgba(14,116,144,.35)}
    50%{transform:scale(1.46);box-shadow:0 0 0 5px #22b8cf,0 16px 28px rgba(14,116,144,.55)}
  }
  @keyframes octoWobble{
    0%,100%{transform:translateY(-4px) rotate(0deg) scale(1,1)}
    25%{transform:translateY(-5px) rotate(-4deg) scale(1.04,.95)}
    50%{transform:translateY(-3px) rotate(0deg) scale(.96,1.05)}
    75%{transform:translateY(-5px) rotate(4deg) scale(1.04,.95)}
  }
  @keyframes inkPop{
    0%{transform:scale(1) rotate(0);opacity:1}
    35%{transform:scale(1.14) rotate(-9deg);opacity:1}
    100%{transform:scale(.08) rotate(22deg);opacity:0}
  }
  @keyframes inkSplat{
    0%{transform:scale(.2) rotate(0);opacity:0}
    30%{opacity:.9}
    100%{transform:scale(1.85) rotate(18deg);opacity:0}
  }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes overlayPop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes bannerIn{0%{transform:translateY(8px);opacity:0}100%{transform:translateY(0);opacity:1}}
  .ctl{border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;padding:7px 14px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.14);transition:transform .1s;white-space:nowrap;line-height:1.15}
  .stat-row .ctl{align-self:stretch}
  .ctl:hover{transform:translateY(-2px)}
  .ctl-hint{background:#ffe6df;color:#c0432e}
  .ctl-hint:hover{background:#ffd4c9}
  .ctl-new{background:#1f2937;color:#fff}
  .ctl-new:hover{background:#374151}
</style>
</head>
<body>
<div class="app-root" style="position:relative;width:100%;display:flex;flex-direction:column;font-family:'Zen Maru Gothic',system-ui,sans-serif;background:radial-gradient(120% 90% at 50% -10%,#f6fdfe 0%,#e3f3f5 55%,#d2eaec 100%);color:#1f2937;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);">

  <div class="hdr" style="display:flex;flex-wrap:wrap;align-items:center;gap:12px 16px;padding:16px 20px 8px;">
    <div style="display:flex;align-items:baseline;gap:9px;">
      <span class="brand-emoji" style="font-size:24px;line-height:1;animation:bob 2.6s ease-in-out infinite;">🐙</span>
      <span class="brand-title" style="font-size:26px;font-weight:900;letter-spacing:.04em;color:#1f2937;">二タコ採り</span>
      <span class="brand-sub" style="font-size:11px;font-weight:700;letter-spacing:.22em;color:#7fb6c2;">TAKO TORI</span>
    </div>
    <div id="theme-group" class="pill-group" style="display:flex;gap:3px;background:#eef1f6;padding:4px;border-radius:13px;"></div>
    <div id="hdr-actions" style="display:flex;gap:6px 10px;align-items:center;margin-left:auto;font-size:12px;font-weight:700;color:#7fb6c2;">
      <a href="https://github.com/nishiokya/takodori/blob/main/README.md" target="_blank" rel="noopener" style="color:#0e7490;text-decoration:none;">遊び方</a>
      <button id="btn-history" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;padding:6px 11px;border-radius:10px;background:#eef1f6;color:#0e7490;display:inline-flex;align-items:center;gap:5px;">🕓<span class="lbl">履歴</span></button>
      <button id="btn-share" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;padding:6px 11px;border-radius:10px;background:#1f2937;color:#fff;display:inline-flex;align-items:center;gap:5px;">𝕏<span class="lbl">シェア</span></button>
    </div>
  </div>

  <div id="boardWrap" style="flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:6px 12px;position:relative;">
    <div id="board"></div>
  </div>

  <div class="stat-row" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;">
    <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:62px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
      <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">TIME</span>
      <span id="stat-time" class="stat-val" style="font-size:19px;font-weight:900;color:#1f2937;font-variant-numeric:tabular-nums;">00:00</span>
    </div>
    <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:70px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
      <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">SCORE</span>
      <span id="stat-score" class="stat-val" style="font-size:19px;font-weight:900;color:#1f2937;font-variant-numeric:tabular-nums;">0</span>
    </div>
    <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:58px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
      <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">残り</span>
      <span id="stat-pairs" class="stat-val" style="font-size:19px;font-weight:900;color:#1f2937;font-variant-numeric:tabular-nums;">0</span>
    </div>
    <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:62px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
      <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">BEST</span>
      <span id="stat-best" class="stat-val" style="font-size:19px;font-weight:900;color:#e0644d;font-variant-numeric:tabular-nums;">—</span>
    </div>
    <button id="btn-new" class="ctl ctl-new">New</button>
    <button id="btn-hint" class="ctl ctl-hint">Hint</button>
  </div>

  <div id="win-overlay" style="display:none;position:fixed;inset:0;z-index:60;align-items:center;justify-content:center;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);padding:20px;">
    <div style="background:#fff;border-radius:24px;padding:36px 40px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:overlayPop .35s cubic-bezier(.2,1.1,.3,1);max-width:340px;width:100%;">
      <div style="font-size:13px;font-weight:700;letter-spacing:.3em;color:#e0644d;">CLEAR</div>
      <div style="font-size:30px;font-weight:900;margin:6px 0 18px;color:#1f2937;">ぜんぶ採った！🐙</div>
      <div style="display:flex;justify-content:center;gap:28px;margin-bottom:8px;">
        <div><div style="font-size:11px;color:#9aa6b6;font-weight:700;letter-spacing:.1em;">TIME</div><div id="final-time" style="font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;">00:00</div></div>
        <div><div style="font-size:11px;color:#9aa6b6;font-weight:700;letter-spacing:.1em;">SCORE</div><div id="final-score" style="font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;">0</div></div>
      </div>
      <div id="final-best" style="font-size:13px;color:#6b7280;margin-bottom:22px;font-weight:500;">自己ベスト —</div>
      <button id="btn-win-share" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;padding:13px 30px;border-radius:14px;background:#1f2937;color:#fff;width:100%;margin-bottom:10px;">𝕏 に投稿</button>
      <button id="btn-again" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;padding:13px 30px;border-radius:14px;background:#1f2937;color:#fff;width:100%;">もう一度</button>
    </div>
  </div>

  <div id="over-overlay" style="display:none;position:fixed;inset:0;z-index:60;align-items:center;justify-content:center;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);padding:20px;">
    <div style="background:#fff;border-radius:24px;padding:36px 40px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:overlayPop .35s cubic-bezier(.2,1.1,.3,1);max-width:340px;width:100%;">
      <div style="font-size:13px;font-weight:700;letter-spacing:.3em;color:#ea580c;">GAME OVER</div>
      <div style="font-size:30px;font-weight:900;margin:6px 0 10px;color:#1f2937;">手づまり！🐙</div>
      <div style="font-size:14px;color:#6b7280;margin-bottom:22px;font-weight:500;">タコに手が届かなくなりました</div>
      <button id="btn-over-new" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;padding:13px 0;border-radius:14px;background:#1f2937;color:#fff;width:100%;">新しいゲーム</button>
    </div>
  </div>

  <div id="history-overlay" style="display:none;position:fixed;inset:0;z-index:70;align-items:center;justify-content:center;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);padding:16px;">
    <div style="background:#fff;border-radius:22px;padding:20px 20px 16px;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:overlayPop .3s cubic-bezier(.2,1.1,.3,1);max-width:400px;width:100%;max-height:85vh;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:18px;font-weight:900;color:#1f2937;">🕓 履歴・盤面コード</div>
        <button id="btn-hist-close" style="border:none;cursor:pointer;font-family:inherit;font-size:20px;font-weight:900;color:#9aa6b6;background:transparent;line-height:1;padding:2px 6px;">×</button>
      </div>
      <div style="background:#f6f9fb;border-radius:13px;padding:10px 12px;margin-bottom:12px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;margin-bottom:3px;">この盤面のコード（コピーで共有URL）</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <code id="hist-cur-code" style="flex:1;font-family:ui-monospace,Menlo,monospace;font-size:15px;font-weight:700;color:#0e7490;overflow:hidden;text-overflow:ellipsis;">—</code>
          <button id="btn-code-copy" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;padding:6px 11px;border-radius:9px;background:#1f2937;color:#fff;white-space:nowrap;">URLをコピー</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:9px;">
          <input id="hist-code-input" type="text" inputmode="latin" autocapitalize="off" autocomplete="off" spellcheck="false" placeholder="コード / URL を貼り付け…" style="flex:1;min-width:0;font-family:ui-monospace,Menlo,monospace;font-size:14px;padding:7px 10px;border:1px solid #d7dee6;border-radius:9px;background:#fff;color:#1f2937;">
          <button id="btn-code-play" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;padding:7px 11px;border-radius:9px;background:#0e7490;color:#fff;white-space:nowrap;">この盤面で遊ぶ</button>
        </div>
        <div id="hist-code-err" style="display:none;font-size:11px;font-weight:700;color:#e0644d;margin-top:6px;">コードが正しくありません</div>
      </div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;margin-bottom:6px;">過去の盤面</div>
      <div id="hist-list" style="overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:60px;display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  var props = { accentColor:'#f59e0b', comboSeconds:5 };

  // all=18x8(144,花牌あり) / std=17x8(136,花牌なし)。DIMS は restoreState の難易度検証に残す。
  var DIMS = { all:{C:18,R:8,flowers:true}, std:{C:17,R:8,flowers:false} };
  // テーマごとの盤サイズ（横長画面の列数×行数）。縦長画面では行と列を入れ替える。
  // タコ=15x8で20種類を各6枚 / 麻雀=18x8。
  var THEME_DIMS = { tako:{C:15,R:8}, mahjong:{C:18,R:8} };
  // 盤の外周マージン（つなぎ線が外側を回るための余白）。タイル幅に対する割合。
  // ぴったり表示なので限りなく小さくしている。
  var BORDER = 0.5;
  var _id = 1;
  var boardWrap = document.getElementById('boardWrap');
  var boardEl = document.getElementById('board');
  var st = null;
  var _timer = null, _hintTimer = null, _matchTimer = null, _ro = null;

  // シード付き乱数（mulberry32）。同じ seed から同じ盤面を再生成するための土台。
  var _rng = Math.random;
  function makeRng(seed){
    var s = seed>>>0;
    return function(){
      s = (s + 0x6D2B79F5) | 0;
      var t = Math.imul(s ^ (s>>>15), 1 | s);
      t = (t + Math.imul(t ^ (t>>>7), 61 | t)) ^ t;
      return ((t ^ (t>>>14)) >>> 0) / 4294967296;
    };
  }

  // ---- tile sets ----
  function buildTako(){
    var types=[
      {key:'tako',    main:'🐙', color:'#e05a4d', tint:'#fdecea'},
      {key:'ika',     main:'🦑', color:'#d98324', tint:'#fdf1e3'},
      {key:'kani',    main:'🦀', color:'#e0556b', tint:'#fdeaee'},
      {key:'ebi',     main:'🦐', color:'#e07a8a', tint:'#fdedf0'},
      {key:'lobster', main:'🦞', color:'#c0392b', tint:'#fbeae8'},
      {key:'fugu',    main:'🐡', color:'#d9a441', tint:'#fdf6e6'},
      {key:'tropi',   main:'🐠', color:'#2aa7c4', tint:'#e6f6fa'},
      {key:'sakana',  main:'🐟', color:'#2f7fd1', tint:'#e8f1fb'},
      {key:'kai',     main:'🐚', color:'#d98ba6', tint:'#fbeef3'},
      {key:'coral',   main:'🪸', color:'#e06a8a', tint:'#fdebf0'},
      {key:'kurage',  main:'🪼', color:'#8a7fd9', tint:'#efedfb'},
      {key:'kame',    main:'🐢', color:'#2e9e6b', tint:'#e7f6ee'},
      {key:'iruka',   main:'🐬', color:'#3aa0d6', tint:'#e7f3fb'},
      {key:'kujira',  main:'🐳', color:'#4a8fd1', tint:'#e9f1fb'},
      {key:'azarashi',main:'🦭', color:'#6b8aa6', tint:'#eef2f7'},
      {key:'same',    main:'🦈', color:'#5a7d99', tint:'#edf2f6'},
      {key:'rakko',   main:'🦦', color:'#a9743f', tint:'#f6ede2'},
      {key:'kujira2', main:'🐋', color:'#3978b8', tint:'#e7f0fa'},
      {key:'pengin',  main:'🐧', color:'#475569', tint:'#eef2f7'},
      {key:'kaki',    main:'🦪', color:'#8b6f9e', tint:'#f3edf6'}
    ].map(function(t){ return Object.assign({},t,{sub:'',honor:false,value:0,suit:t.key,pat:null}); });
    // タコテーマは花牌なし（海の生きもの＝動物だけ）。
    return { types:types, flowers:[] };
  }

  function buildMahjong(){
    var types=[];
    var suits=[
      {suit:'man',color:'#c0392b',pat:null, sub:'萬',tint:'#fdeceb',num:['','一','二','三','四','五','六','七','八','九']},
      {suit:'pin',color:'#1d4ed8',pat:'dot',sub:'筒',tint:'#e8eefb',num:[]},
      {suit:'sou',color:'#15803d',pat:'bar',sub:'索',tint:'#e7f5ec',num:[]}
    ];
    suits.forEach(function(s){ for(var v=1;v<=9;v++) types.push({key:s.suit+'-'+v,suit:s.suit,value:v,main:s.pat?'':s.num[v],sub:s.pat?'':s.sub,color:s.color,tint:s.tint,honor:false,pat:s.pat}); });
    var honors=[{ch:'東',c:'#3730a3'},{ch:'南',c:'#3730a3'},{ch:'西',c:'#3730a3'},{ch:'北',c:'#3730a3'},{ch:'中',c:'#c0392b'},{ch:'發',c:'#15803d'},{ch:'白',c:'#475569'}];
    honors.forEach(function(h,i){ types.push({key:'honor-'+i,suit:'honor',value:i,main:h.ch,sub:'',color:h.c,tint:'#eef1fb',honor:true,pat:(h.ch==='白'?'haku':null)}); });
    var flowers=[
      {key:'h-ume', main:'梅', sub:'花', color:'#c0392b', tint:'#fdeceb'},
      {key:'h-ran', main:'蘭', sub:'花', color:'#15803d', tint:'#e7f5ec'},
      {key:'h-take',main:'竹', sub:'花', color:'#0e7490', tint:'#e3f4f7'},
      {key:'h-kiku',main:'菊', sub:'花', color:'#d99a2a', tint:'#fdf4e0'}
    ].map(function(t){ return Object.assign({},t,{honor:false,value:0,suit:t.key,flower:true,pat:null}); });
    return { types:types, flowers:flowers };
  }

  var SETS = { tako:buildTako(), mahjong:buildMahjong() };

  // ---- state ----
  function isPortrait(){ return window.innerHeight >= window.innerWidth; }

  function freshState(diff, theme, seed, dims){
    theme = theme || (st && st.tileSet) || 'tako';
    var base = THEME_DIMS[theme] || THEME_DIMS.tako, C=base.C, R=base.R, flowers=true;
    // dims 指定時は旧形式の盤面コードや保存データの寸法を厳密に再現する。
    if(dims){ C=dims.C; R=dims.R; }
    else if(isPortrait()){ var tmp=C; C=R; R=tmp; }
    if(seed==null) seed=(Math.random()*0x100000000)>>>0;
    seed=seed>>>0;
    var set=SETS[theme];
    _rng=makeRng(seed);
    var grid=generateSolvable(C,R,flowers,set);
    return { difficulty:diff,tileSet:theme,seed:seed,C:C,R:R,grid:grid,selectedId:null,hintIds:[],removingIds:[],pathCells:[],score:0,combo:0,lastMatch:0,timeSec:0,status:'playing',deadlock:false,fit:true,tileSize:44,tileW:44,tileH:44,best:getBest(diff,theme),animating:false };
  }

  function loadTheme(){ try{ return localStorage.getItem('nitako_theme')||'tako'; }catch(e){ return 'tako'; } }
  function saveTheme(t){ try{ localStorage.setItem('nitako_theme',t); }catch(e){} }
  function getBest(diff,theme){ try{ var v=localStorage.getItem('nitako_best_'+theme+'_'+diff); return v?parseInt(v,10):null; }catch(e){ return null; } }
  function setBest(diff,theme,sec){ try{ localStorage.setItem('nitako_best_'+theme+'_'+diff,String(sec)); }catch(e){} }

  // ---- 盤面コード（ハッシュ）: 盤サイズはテーマごとに固定し、theme・seed だけを含める ----
  var CODE_V=1;
  var THEME_CHAR={tako:'k',mahjong:'m'}, CHAR_THEME={k:'tako',m:'mahjong'};
  function encodeCode(state){
    var ch=THEME_CHAR[state.tileSet]||'k';
    var base=THEME_DIMS[state.tileSet]||THEME_DIMS.tako;
    var standard=(state.C===base.C&&state.R===base.R)||(state.C===base.R&&state.R===base.C);
    if(!standard) return ch+'-'+state.C+'x'+state.R+'-'+(state.seed>>>0).toString(36);
    return ch+'-'+(state.seed>>>0).toString(36);
  }
  // サイズ入りの旧コードも引き続き読み込める。
  function decodeCode(str){
    if(!str) return null;
    var value=String(str).trim().toLowerCase();
    var legacy=value.match(/([km])-(\d+)x(\d+)-([0-9a-z]+)/);
    var m=legacy||value.match(/([km])-([0-9a-z]+)/);
    if(!m) return null;
    var theme=CHAR_THEME[m[1]], base=THEME_DIMS[theme], C=legacy?parseInt(m[2],10):(isPortrait()?base.R:base.C), R=legacy?parseInt(m[3],10):(isPortrait()?base.C:base.R);
    var seed=parseInt(legacy?m[4]:m[2],36);
    if(!theme||!(seed>=0)) return null;
    var mx=Math.max(C,R), difficulty = mx===17?'std':'all';
    return { theme:theme, C:C, R:R, seed:seed>>>0, difficulty:difficulty };
  }

  // ---- URL 連携（モード＋ハッシュを URL に載せて盤面を組み立て/共有する）----
  function boardUrl(state){ return location.origin+location.pathname+'?b='+encodeCode(state); }
  function readUrlBoard(){ try{ var p=new URLSearchParams(location.search); var b=p.get('b')||p.get('board'); return b?decodeCode(b):null; }catch(e){ return null; } }
  function readUrlTheme(){ try{ var t=new URLSearchParams(location.search).get('theme'); if(t==='mahjong'||t==='m') return 'mahjong'; if(t==='tako'||t==='k') return 'tako'; return null; }catch(e){ return null; } }
  function syncUrl(){ if(st){ try{ history.replaceState(null,'','?b='+encodeCode(st)); }catch(e){} } }

  // ---- 遊びかけの盤面を保存/復元（スマホ再起動対策）----
  // 盤面は常に全マス埋まって始まるので「空マス = 消したマス」。seed + removed だけで復元できる。
  function saveGame(){
    try{
      if(!st || st.status!=='playing' || st.deadlock || st.recorded) return;
      var removed=[];
      for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++) if(!st.grid[r][c]) removed.push([r,c]);
      localStorage.setItem('nitako_save', JSON.stringify({
        v:CODE_V, seed:st.seed, difficulty:st.difficulty, tileSet:st.tileSet,
        C:st.C, R:st.R, removed:removed, score:st.score, combo:st.combo,
        lastMatch:st.lastMatch, timeSec:st.timeSec
      }));
    }catch(e){}
  }
  function clearSave(){ try{ localStorage.removeItem('nitako_save'); }catch(e){} }
  function loadSave(){ try{ var v=localStorage.getItem('nitako_save'); return v?JSON.parse(v):null; }catch(e){ return null; } }
  function restoreState(sv){
    if(!sv || sv.v!==CODE_V || !SETS[sv.tileSet] || !DIMS[sv.difficulty]) return null;
    var total=sv.C*sv.R;
    if(!(sv.removed) || sv.removed.length>=total) return null; // 全消し=クリア済み等は復元しない
    var s=freshState(sv.difficulty, sv.tileSet, sv.seed, {C:sv.C, R:sv.R});
    sv.removed.forEach(function(p){ if(s.grid[p[0]]&&s.grid[p[0]][p[1]]) s.grid[p[0]][p[1]]=null; });
    s.score=sv.score||0; s.combo=sv.combo||0; s.lastMatch=sv.lastMatch||0; s.timeSec=sv.timeSec||0;
    s.status='playing'; s.deadlock=false;
    return s;
  }

  // ---- 履歴（クリア／ゲームオーバーの盤面とスコア）----
  function loadHistory(){ try{ var v=localStorage.getItem('nitako_history'); var a=v?JSON.parse(v):[]; return Array.isArray(a)?a:[]; }catch(e){ return []; } }
  function pushHistory(state, cleared){
    try{
      var hist=loadHistory();
      hist.unshift({ seed:state.seed, code:encodeCode(state), difficulty:state.difficulty,
        tileSet:state.tileSet, C:state.C, R:state.R, score:state.score, timeSec:state.timeSec,
        cleared:!!cleared, date:new Date().toISOString() });
      if(hist.length>50) hist=hist.slice(0,50);
      localStorage.setItem('nitako_history', JSON.stringify(hist));
    }catch(e){}
  }
  // ゲーム終了を一度だけ記録し、保存中の遊びかけを消す。
  function endGame(cleared){
    if(st.recorded) return;
    st.recorded=true;
    pushHistory(st, cleared);
    clearSave();
  }

  // seed/theme/寸法から新しい試行を開始する共通処理（新規・再挑戦・コード再現で共有）。
  function startBoard(opt){
    if(_matchTimer) clearTimeout(_matchTimer);
    if(_hintTimer) clearTimeout(_hintTimer);
    var theme=opt.theme||(st&&st.tileSet)||'tako';
    var diff=opt.difficulty||(st&&st.difficulty)||'all';
    var dims=(opt.C&&opt.R)?{C:opt.C,R:opt.R}:null;
    st=freshState(diff, theme, opt.seed, dims);
    saveTheme(theme);
    saveGame(); syncUrl();
    applyLayoutMode();
    renderModes(); renderBanners();
    setTimeout(function(){ applyLayoutMode(); computeSize(); renderAll(); },0);
  }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(_rng()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

  function randomFill(C,R,flowers,set){
    var positions=[];
    for(var r=1;r<=R;r++) for(var c=1;c<=C;c++) positions.push({r:r,c:c});
    shuffle(positions);
    var N=positions.length;
    var pairsNeeded=N/2;
    var bag=[];
    if(flowers){ set.flowers.forEach(function(f){ bag.push(f,f); }); pairsNeeded-=set.flowers.length; }
    var order=shuffle(set.types.slice());
    for(var i=0;i<pairsNeeded;i++){ var t=order[i%order.length]; bag.push(t,t); }
    shuffle(bag);
    var grid=[]; for(var rr=0;rr<R+2;rr++) grid.push(new Array(C+2).fill(null));
    positions.forEach(function(p,idx){ grid[p.r][p.c]=Object.assign({},bag[idx],{id:_id++}); });
    return grid;
  }

  function generateSolvable(C,R,flowers,set){
    var last=null;
    for(var a=0;a<16;a++){
      var g=randomFill(C,R,flowers,set); last=g;
      if(findAnyMove(g,C,R)) return g;
    }
    return last;
  }

  function isEmpty(grid,C,R,r,c){ return r>=0&&r<=R+1&&c>=0&&c<=C+1&&!grid[r][c]; }
  function betweenClear(grid,a,b){
    if(a.r===b.r){ var lo=Math.min(a.c,b.c),hi=Math.max(a.c,b.c); for(var c=lo+1;c<hi;c++) if(grid[a.r][c]) return false; return true; }
    if(a.c===b.c){ var lo2=Math.min(a.r,b.r),hi2=Math.max(a.r,b.r); for(var r=lo2+1;r<hi2;r++) if(grid[r][a.c]) return false; return true; }
    return false;
  }
  function connectPath(grid,C,R,a,b){
    if((a.r===b.r||a.c===b.c) && betweenClear(grid,a,b)) return [a,b];
    var k1={r:a.r,c:b.c}, k2={r:b.r,c:a.c};
    if(isEmpty(grid,C,R,k1.r,k1.c) && betweenClear(grid,a,k1) && betweenClear(grid,k1,b)) return [a,k1,b];
    if(isEmpty(grid,C,R,k2.r,k2.c) && betweenClear(grid,a,k2) && betweenClear(grid,k2,b)) return [a,k2,b];
    for(var rr=0;rr<=R+1;rr++){
      var c1={r:rr,c:a.c}, c2={r:rr,c:b.c};
      if(isEmpty(grid,C,R,c1.r,c1.c) && isEmpty(grid,C,R,c2.r,c2.c)
        && betweenClear(grid,a,c1) && betweenClear(grid,c1,c2) && betweenClear(grid,c2,b)) return [a,c1,c2,b];
    }
    for(var cc=0;cc<=C+1;cc++){
      var d1={r:a.r,c:cc}, d2={r:b.r,c:cc};
      if(isEmpty(grid,C,R,d1.r,d1.c) && isEmpty(grid,C,R,d2.r,d2.c)
        && betweenClear(grid,a,d1) && betweenClear(grid,d1,d2) && betweenClear(grid,d2,b)) return [a,d1,d2,b];
    }
    return null;
  }

  function findAnyMove(grid,C,R){
    var groups={};
    for(var r=1;r<=R;r++) for(var c=1;c<=C;c++){ var t=grid[r][c]; if(t){ (groups[t.key]||(groups[t.key]=[])).push({r:r,c:c}); } }
    for(var key in groups){
      var arr=groups[key];
      for(var i=0;i<arr.length;i++) for(var j=i+1;j<arr.length;j++){
        var path=connectPath(grid,C,R,arr[i],arr[j]);
        if(path) return {a:arr[i],b:arr[j],path:path,id1:grid[arr[i].r][arr[i].c].id,id2:grid[arr[j].r][arr[j].c].id};
      }
    }
    return null;
  }

  function findTilePos(id){ for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++){ if(st.grid[r][c]&&st.grid[r][c].id===id) return {r:r,c:c}; } return null; }

  // ---- interaction ----
  function onTile(id){
    if(st.status!=='playing'||st.animating) return;
    if(st.selectedId==null){ st.selectedId=id; st.hintIds=[]; renderBoard(); return; }
    if(st.selectedId===id){ st.selectedId=null; renderBoard(); return; }
    var a=findTilePos(st.selectedId), b=findTilePos(id);
    if(!a||!b){ st.selectedId=id; renderBoard(); return; }
    var ta=st.grid[a.r][a.c], tb=st.grid[b.r][b.c];
    if(ta.key===tb.key){
      var path=connectPath(st.grid,st.C,st.R,a,b);
      if(path){ doMatch(a,b,path,id,st.selectedId); return; }
    }
    st.selectedId=id; renderBoard();
  }

  function doMatch(a,b,path,idB,idA){
    var win=(props.comboSeconds!=null?props.comboSeconds:5)*1000;
    var now=Date.now();
    var combo=(now-st.lastMatch<=win && st.combo>0)?st.combo+1:1;
    st.pathCells=path; st.removingIds=[idA,idB]; st.selectedId=null; st.animating=true;
    st.combo=combo; st.lastMatch=now; st.score=st.score+100*combo; st.hintIds=[];
    renderBoard(); renderStats();
    _matchTimer=setTimeout(function(){
      var grid=st.grid.map(function(row){ return row.slice(); });
      grid[a.r][a.c]=null; grid[b.r][b.c]=null;
      var remaining=0; grid.forEach(function(row){ row.forEach(function(c){ if(c) remaining++; }); });
      var won=remaining===0;
      var deadlock=!won && !findAnyMove(grid,st.C,st.R);
      st.grid=grid; st.removingIds=[]; st.pathCells=[]; st.animating=false; st.deadlock=deadlock;
      if(won){ st.status='won'; if(st.best==null||st.timeSec<st.best){ setBest(st.difficulty,st.tileSet,st.timeSec); st.best=st.timeSec; } endGame(true); }
      else if(deadlock){ endGame(false); }
      else { saveGame(); }
      computeSize(); renderBoard(); renderStats(); renderBanners();
    },420);
  }

  function hint(){
    if(st.status!=='playing'||st.animating) return;
    var m=findAnyMove(st.grid,st.C,st.R);
    if(m){
      // ペアのうち上（行が小さい）優先、同行なら右（列が大きい）の1枚だけを示す。
      var pickA = (m.a.r < m.b.r) || (m.a.r===m.b.r && m.a.c > m.b.c);
      st.hintIds=[pickA ? m.id1 : m.id2]; st.score=Math.floor(st.score/2);
      saveGame();
      renderBoard(); renderStats();
      _hintTimer=setTimeout(function(){ if(st.hintIds.length){ st.hintIds=[]; renderBoard(); } },1800);
    } else { st.deadlock=true; endGame(false); renderBanners(); }
  }

  function newGame(diff){
    startBoard({difficulty:diff||st.difficulty, theme:st.tileSet});
  }
  function setTheme(t){
    if(t===st.tileSet) return;
    startBoard({difficulty:st.difficulty, theme:t});
  }

  function isCompactMobile(){
    return window.innerWidth<=600 && isPortrait();
  }

  // スマホでは両テーマを1画面に収め、PCの麻雀だけ縦長スクロールにする。
  var appRootEl=document.querySelector('.app-root');
  function applyLayoutMode(){
    if(!appRootEl) return;
    if(st.tileSet==='mahjong'&&!isCompactMobile()){
      // 縦長: ページを伸ばして下にスクロール。盤は幅基準で大きめ。
      appRootEl.style.height='auto';
      appRootEl.style.minHeight='100dvh';
      appRootEl.style.overflow='visible';
      boardWrap.style.flex='0 0 auto';
      boardWrap.style.overflow='visible';
    } else {
      // 1画面フィット: 高さを可視ビューポートに固定して収める。
      appRootEl.style.height='';
      appRootEl.style.minHeight='';
      appRootEl.style.overflow='';
      boardWrap.style.flex='1';
      boardWrap.style.overflow='hidden';
    }
  }

  // スマホでは、牌がなくなった上下の行を表示上だけ畳む。
  function boardViewport(){
    if(!isCompactMobile()) return {top:1,bottom:st.R,rows:st.R};
    var top=st.R+1, bottom=0;
    for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++){
      if(st.grid[r][c]){ top=Math.min(top,r); bottom=Math.max(bottom,r); }
    }
    if(bottom===0) return {top:1,bottom:st.R,rows:st.R};
    return {top:top,bottom:bottom,rows:bottom-top+1};
  }

  function displayRow(r,viewport){
    if(r<viewport.top) return 0;
    if(r>viewport.bottom) return viewport.rows+1;
    return r-viewport.top+1;
  }

  // ---- sizing ----
  function computeSize(){
    if(!boardWrap) return;
    // 正方形タイル。タコも少し余白を残しつつ横幅を広く使う。
    var w=boardWrap.clientWidth-24;
    var availH=Math.max(160,boardWrap.clientHeight-12);
    var C=st.C,R=boardViewport().rows;
    var byW=Math.floor(w/(C+2*BORDER));
    var byH=Math.floor(availH/(R+2*BORDER));
    if(st.tileSet==='tako'||isCompactMobile()){
      // スマホは両テーマとも残り高さに合わせて1画面に収める。
      var ts=Math.max(12,Math.min(byW,byH));
      if(ts!==st.tileW||ts!==st.tileH||ts!==st.tileSize){ st.tileW=ts; st.tileH=ts; st.tileSize=ts; renderBoard(); }
      return;
    }
    // 麻雀は幅基準（正方形・縦にはみ出す分はスクロール）。
    var s = (st.tileSet==='mahjong') ? Math.max(12,byW) : Math.max(12,Math.min(byW,byH));
    if(s!==st.tileW||s!==st.tileH){ st.tileW=s; st.tileH=s; st.tileSize=s; renderBoard(); }
  }

  function fmt(s){ var m=Math.floor(s/60),ss=s%60; return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; }
  function pillStyle(active){ return {border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'13.5px',padding:'8px 14px',borderRadius:'10px',background:active?'#1f2937':'transparent',color:active?'#fff':'#67748a',transition:'all .15s'}; }

  // ---- mahjong pip helpers ----
  function pipColors(pat,n){
    var B='#1d56c0', G='#1f9a4f', R='#c0392b', a;
    if(pat==='dot'){
      a=new Array(n).fill(B);
      if(n===2){a[0]=G;a[1]=B;}
      else if(n===3){a[0]=B;a[1]=R;a[2]=G;}
      else if(n===4){a[0]=G;a[1]=B;a[2]=B;a[3]=G;}
      else if(n===5){a[0]=B;a[1]=B;a[2]=R;a[3]=G;a[4]=G;}
      else if(n===6){a[0]=G;a[1]=G;a[2]=G;a[3]=B;a[4]=B;a[5]=B;}
      else if(n===7){a[0]=R;a[1]=R;a[2]=R;a[3]=G;a[4]=G;a[5]=G;a[6]=G;}
      else if(n===8){a.fill(B);}
      else if(n===9){a[0]=B;a[1]=B;a[2]=B;a[3]=R;a[4]=R;a[5]=R;a[6]=G;a[7]=G;a[8]=G;}
      return a;
    }
    a=new Array(n).fill(G);
    if(n===5){a[2]=R;}
    else if(n===6){a[4]=B;a[5]=B;}
    else if(n===7){a[0]=R;}
    else if(n===9){a[0]=R;a[1]=R;a[2]=R;a[6]=B;a[7]=B;a[8]=B;}
    return a;
  }
  function pipLayout(n){
    var L={
      1:[[50,50]],
      2:[[50,27],[50,73]],
      3:[[24,20],[50,50],[76,80]],
      4:[[30,30],[70,30],[30,70],[70,70]],
      5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
      6:[[30,21],[70,21],[30,50],[70,50],[30,79],[70,79]],
      7:[[26,13],[50,20],[74,27],[33,58],[67,58],[33,84],[67,84]],
      8:[[32,14],[68,14],[32,38],[68,38],[32,62],[68,62],[32,86],[68,86]],
      9:[[20,20],[50,20],[80,20],[20,50],[50,50],[80,50],[20,80],[50,80],[80,80]]
    };
    return L[n]||L[1];
  }
  // 索（バー）専用レイアウト。3/7/8 の並びと8の回転がドットと異なる。
  function pipLayoutSou(n){
    var L={
      1:[[50,50]],
      2:[[50,20],[50,80]],
      3:[[50,21],[34,73],[66,73]],
      4:[[24,24],[76,24],[24,76],[76,76]],
      5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
      6:[[20,15],[80,15],[20,50],[80,50],[20,85],[80,85]],
      7:[[50,13],[29,49],[50,49],[71,49],[29,81],[50,81],[71,81]],
      8:[[43,24,-42],[57,24,42],[43,36,42],[57,36,-42],[43,64,-42],[57,64,42],[43,76,42],[57,76,-42]],
      9:[[20,20],[50,20],[80,20],[20,50],[50,50],[80,50],[20,80],[50,80],[80,80]]
    };
    return L[n]||L[1];
  }

  // ---- rendering ----
  function renderModes(){
    var tg=document.getElementById('theme-group');
    tg.innerHTML='';
    [{k:'tako',label:'タコ'},{k:'mahjong',label:'麻雀'}].forEach(function(d){
      var btn=document.createElement('button');
      btn.className='pill';
      btn.textContent=d.label;
      Object.assign(btn.style,pillStyle(st.tileSet===d.k));
      btn.onclick=function(){ setTheme(d.k); };
      tg.appendChild(btn);
    });
  }

  function renderStats(){
    var remaining=0; for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++) if(st.grid[r][c]) remaining++;
    var pairs=Math.ceil(remaining/2);
    document.getElementById('stat-time').textContent=fmt(st.timeSec);
    document.getElementById('stat-score').textContent=st.score;
    document.getElementById('stat-pairs').textContent=pairs;
    document.getElementById('stat-best').textContent=st.best!=null?fmt(st.best):'—';
  }

  function buildPips(patWrap, t, ts, side){

    } else if(n===1){

        +"<path d='M20 46 Q20 12 50 12 Q80 12 80 46 L80 66 Q79 75 73 81 Q70 72 65 70 Q62 83 57 72 Q54 63 50 77 Q46 63 43 72 Q38 83 35 70 Q30 72 27 81 Q21 75 20 66 Z' fill='%231f9a4f'/>"
        +"<path d='M20 46 Q20 12 50 12 Q80 12 80 46' fill='none' stroke='%23146e38' stroke-width='2' opacity='.4'/>"
        +"<ellipse cx='31' cy='41' rx='5' ry='3.4' fill='%2358c47e' opacity='.7'/>"
        +"<ellipse cx='69' cy='41' rx='5' ry='3.4' fill='%2358c47e' opacity='.7'/>"
        +"<ellipse cx='39' cy='42' rx='6.6' ry='8.2' fill='%23fff'/><circle cx='40' cy='44' r='3.4' fill='%23142a18'/>"
        +"<ellipse cx='61' cy='42' rx='6.6' ry='8.2' fill='%23fff'/><circle cx='60' cy='44' r='3.4' fill='%23142a18'/>"
        +"<path d='M43 56 Q50 62 57 56' fill='none' stroke='%23c0392b' stroke-width='2.8' stroke-linecap='round'/>"
        +"<circle cx='50' cy='26' r='3.6' fill='%23c0392b'/>"
        +"</svg>";
      var uri='url("data:image/svg+xml,'+tako.replace(/</g,'%3C').replace(/>/g,'%3E').replace(/ /g,'%20')+'")';
      var sp=document.createElement('span');
      Object.assign(sp.style,{position:'absolute',inset:'-8%',backgroundImage:uri,backgroundSize:'contain',backgroundRepeat:'no-repeat',backgroundPosition:'center',filter:'drop-shadow(0 1.5px 1px rgba(0,0,0,.28))'});
      patWrap.appendChild(sp);
    } else if(n===8){
      // 八索：竹の結びを SVG で表現。
      var knot="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>"
        +"<g fill='%232fae5a' stroke='%23147a37' stroke-width='0.8'>"
        +"<ellipse cx='33' cy='12' rx='5.2' ry='2.7'/><ellipse cx='67' cy='12' rx='5.2' ry='2.7'/>"
        +"<ellipse cx='33' cy='88' rx='5.2' ry='2.7'/><ellipse cx='67' cy='88' rx='5.2' ry='2.7'/>"
        +"</g>"
        +"<g fill='none' stroke='%231a4b5a' stroke-width='8.5' stroke-linecap='round' stroke-linejoin='round'>"
        +"<path d='M33 14 L33 42 L50 25 L67 42 L67 14'/>"
        +"<path d='M33 86 L33 58 L50 75 L67 58 L67 86'/>"
        +"</g>"
        +"<g fill='none' stroke='%233f6f7d' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' opacity='.55'>"
        +"<path d='M33 14 L33 42 L50 25 L67 42 L67 14'/>"
        +"<path d='M33 86 L33 58 L50 75 L67 58 L67 86'/>"
        +"</g>"
        +"</svg>";
      var ku='url("data:image/svg+xml,'+knot.replace(/</g,'%3C').replace(/>/g,'%3E').replace(/ /g,'%20')+'")';
      var sp2=document.createElement('span');
      Object.assign(sp2.style,{position:'absolute',inset:'-4%',backgroundImage:ku,backgroundSize:'contain',backgroundRepeat:'no-repeat',backgroundPosition:'center',filter:'drop-shadow(0 1.5px 1px rgba(0,0,0,.28))'});
      patWrap.appendChild(sp2);
    } else {
      var slay=pipLayoutSou(n);
      var bh=Math.round(side*(n===8?0.3:n<=2?0.5:n<=4?0.4:n<=6?0.33:0.27));
      var bw=Math.max(3,Math.round(bh*0.38));
      slay.forEach(function(p,i){
        var col=cols[i], lt='#37b35e', dk='#176b32';
        if(col==='#c0392b'){ lt='#e0563f'; dk='#9b2a1c'; }
        else if(col==='#1d56c0'){ lt='#4f86e6'; dk='#1c3f9c'; }
        var bg='repeating-linear-gradient(180deg,rgba(255,255,255,0) 0,rgba(255,255,255,0) 23%,rgba(0,0,0,.34) 24.5%,rgba(0,0,0,.34) 29%,rgba(255,255,255,0) 30.5%),linear-gradient(90deg,'+dk+','+lt+' 42%,'+dk+')';
        var rot=p[2]?(' rotate('+p[2]+'deg)'):'';
        var bar=document.createElement('span');
        Object.assign(bar.style,{position:'absolute',left:p[0]+'%',top:p[1]+'%',width:bw+'px',height:bh+'px',transform:'translate(-50%,-50%)'+rot,borderRadius:Math.round(bw*0.5)+'px',background:bg,boxShadow:'inset 1.2px 0 0 rgba(255,255,255,.45),inset -1px 0 0 rgba(0,0,0,.18),0 1px 1px rgba(0,0,0,.25)'});
        patWrap.appendChild(bar);
      });
    }
  }

  function renderBoard(){
    var isEmoji=st.tileSet==='tako';
    var tw=st.tileW, th=st.tileH, ts=st.tileSize, gap=isEmoji?Math.max(0,Math.round(ts*0.02)):Math.max(1,Math.round(ts*0.06));
    var sel=st.selectedId, hint=new Set(st.hintIds), rem=new Set(st.removingIds);
    var viewport=boardViewport();
    boardEl.innerHTML='';
    Object.assign(boardEl.style,{position:'relative',width:((st.C+2*BORDER)*tw)+'px',height:((viewport.rows+2*BORDER)*th)+'px',margin:'0 auto',background:isEmoji?'transparent':'rgba(255,255,255,.4)',borderRadius:Math.round(ts*(isEmoji?0.08:0.22))+'px',boxShadow:isEmoji?'none':'inset 0 0 0 1px rgba(120,135,160,.18)'});

    for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++){
      var t=st.grid[r][c]; if(!t) continue;
      var isSel=t.id===sel, isHint=hint.has(t.id), isRem=rem.has(t.id);
      var rad=Math.round(ts*(isEmoji?0.08:0.16));
      var pad=Math.max(2,Math.round(ts*0.07));
      var lip=isEmoji?0:Math.max(3,Math.round(ts*0.13));
      var baseShadow=isEmoji?'none':'inset 0 1.5px 1px rgba(255,255,255,.95),inset 0 -'+lip+'px 0 #dccfae,inset 0 -'+(lip+2)+'px 1px rgba(120,95,45,.4)';
      var btn=document.createElement('button');
      Object.assign(btn.style,{position:'absolute',left:((c-1+BORDER)*tw+gap)+'px',top:((displayRow(r,viewport)-1+BORDER)*th+gap)+'px',width:(tw-2*gap)+'px',height:(th-2*gap)+'px',borderRadius:rad+'px',background:isEmoji?'transparent':'linear-gradient(155deg,#fffdf5 0%,#f7f0de 46%,#ece1c6 100%)',border:'none',padding:'0 0 '+lip+'px',margin:0,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',boxShadow:isEmoji?(isSel?'0 0 0 3px '+t.color:'none'):(isSel?(baseShadow+',0 0 0 3px '+t.color+',0 14px 20px rgba(50,40,20,.3)'):(baseShadow+',0 3px 5px rgba(60,48,24,.3)')),transform:isSel?'translateY(-4px)':'none',transition:'transform .12s,box-shadow .12s',zIndex:isHint?8:(isSel?6:2),fontFamily:'inherit',overflow:isEmoji?'hidden':'visible',animation:isRem?'inkPop .42s ease forwards':(isHint?'hintBig .85s ease-in-out infinite':(isSel?'octoWobble 1.1s ease-in-out infinite':'none'))});

      if(!isEmoji){
        var accent=document.createElement('span');
        Object.assign(accent.style,{position:'absolute',left:pad+'px',right:pad+'px',top:pad+'px',bottom:(lip+pad-1)+'px',borderRadius:Math.round(ts*0.1)+'px',background:'linear-gradient(160deg,#ffffff 0%,#fcf8ee 60%,#f4ebd6 100%)',boxShadow:'inset 0 1px 2px rgba(120,95,45,.22),inset 0 -1px 0 rgba(255,255,255,.7)',zIndex:1,pointerEvents:'none'});
        btn.appendChild(accent);
      }

      if(t.pat){
        var side=Math.round(ts*0.9);
        var patWrap=document.createElement('span');
        Object.assign(patWrap.style,{position:'relative',zIndex:2,width:side+'px',height:side+'px'});
        buildPips(patWrap, t, ts, side);
        btn.appendChild(patWrap);
      } else {
        var isMan=t.suit==='man';
        var main=document.createElement('span');
        main.textContent=t.main;
        Object.assign(main.style,{position:'relative',zIndex:2,fontSize:Math.round(ts*(isEmoji?1.12:(isMan?0.39:0.46)))+'px',fontWeight:isMan?900:800,color:isMan?'#171717':t.color,lineHeight:isEmoji?0.88:1,letterSpacing:isMan?'-.03em':'0',marginTop:0,filter:'none',textShadow:isEmoji?'none':'0 1px 0 rgba(255,255,255,.85),0 -1px 1px rgba(0,0,0,.18)'});
        var sub=document.createElement('span');
        sub.textContent=t.sub||' ';
        Object.assign(sub.style,{position:'relative',zIndex:2,fontSize:Math.round(ts*(isMan?0.46:0.2))+'px',fontWeight:900,color:t.color,opacity:1,lineHeight:1,marginTop:Math.round(ts*(isMan?0.03:0.01))+'px',display:t.sub?'block':'none',textShadow:isMan?'0 1px 0 rgba(255,255,255,.55)':'0 1px 0 rgba(255,255,255,.7)'});
        btn.appendChild(main); btn.appendChild(sub);
      }

      (function(id){ btn.onclick=function(){ onTile(id); }; })(t.id);
      boardEl.appendChild(btn);
    }

    // イカスミ（消える瞬間に飛び散る）
    if(st.removingIds.length){
      st.removingIds.forEach(function(id){
        var pos=findTilePos(id); if(!pos) return;
        var blob=document.createElement('div');
        Object.assign(blob.style,{position:'absolute',left:((pos.c-0.5+BORDER)*tw)+'px',top:((displayRow(pos.r,viewport)-0.5+BORDER)*th)+'px',width:(ts*1.4)+'px',height:(ts*1.4)+'px',marginLeft:(-ts*0.7)+'px',marginTop:(-ts*0.7)+'px',background:'radial-gradient(circle at 50% 45%, rgba(38,30,55,.92) 0%, rgba(48,40,72,.55) 42%, rgba(48,40,72,0) 70%)',borderRadius:'47% 53% 44% 56% / 55% 47% 53% 45%',pointerEvents:'none',zIndex:8,animation:'inkSplat .5s ease-out forwards'});
        boardEl.appendChild(blob);
      });
    }

    if(st.pathCells&&st.pathCells.length){
      var pathStr=st.pathCells.map(function(p){ return ((p.c-0.5+BORDER)*tw)+','+((displayRow(p.r,viewport)-0.5+BORDER)*th); }).join(' ');
      var svgNS='http://www.w3.org/2000/svg';
      var svg=document.createElementNS(svgNS,'svg');
      svg.setAttribute('width',(st.C+2*BORDER)*tw); svg.setAttribute('height',(viewport.rows+2*BORDER)*th);
      Object.assign(svg.style,{position:'absolute',left:0,top:0,pointerEvents:'none',zIndex:9});
      var strokeW=Math.max(3,Math.round(ts*0.13));
      var halo=document.createElementNS(svgNS,'polyline');
      halo.setAttribute('points',pathStr); halo.setAttribute('fill','none'); halo.setAttribute('stroke','#ffffff');
      halo.setAttribute('stroke-width',strokeW+5); halo.setAttribute('stroke-linejoin','round'); halo.setAttribute('stroke-linecap','round');
      var line=document.createElementNS(svgNS,'polyline');
      line.setAttribute('points',pathStr); line.setAttribute('fill','none'); line.setAttribute('stroke',props.accentColor||'#2b5563');
      line.setAttribute('stroke-width',strokeW); line.setAttribute('stroke-linejoin','round'); line.setAttribute('stroke-linecap','round');
      svg.appendChild(halo); svg.appendChild(line);
      boardEl.appendChild(svg);
    }
  }

  function renderBanners(){
    var isOver=st.deadlock&&st.status==='playing';
    document.getElementById('over-overlay').style.display=isOver?'flex':'none';
    var overlay=document.getElementById('win-overlay');
    if(st.status==='won'){
      overlay.style.display='flex';
      document.getElementById('final-time').textContent=fmt(st.timeSec);
      document.getElementById('final-score').textContent=st.score;
      document.getElementById('final-best').textContent='自己ベスト '+(st.best!=null?fmt(st.best):'—');
    } else {
      overlay.style.display='none';
    }
  }

  function renderAll(){ renderModes(); renderBoard(); renderStats(); renderBanners(); }

  // ---- 履歴モーダル ----
  var THEME_EMOJI={tako:'🐙',mahjong:'🀄'};
  function fmtDate(iso){
    try{ var d=new Date(iso), p=function(n){ return (n<10?'0':'')+n; };
      return (d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes()); }
    catch(e){ return ''; }
  }
  function renderHistory(){
    var el=document.getElementById('hist-list'); el.innerHTML='';
    var hist=loadHistory();
    if(!hist.length){
      var e=document.createElement('div');
      e.textContent='まだ記録がありません';
      e.style.cssText='color:#9aa6b6;font-size:13px;font-weight:700;text-align:center;padding:18px 0;';
      el.appendChild(e); return;
    }
    hist.forEach(function(rec){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;background:#f6f9fb;border-radius:12px;padding:9px 11px;';
      var info=document.createElement('div'); info.style.cssText='flex:1;min-width:0;';
      var line1=document.createElement('div');
      line1.style.cssText='display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:#1f2937;flex-wrap:wrap;';
      var badge=rec.cleared
        ?'<span style="font-size:10px;font-weight:800;color:#fff;background:#2e9e6b;border-radius:6px;padding:2px 6px;">クリア</span>'
        :'<span style="font-size:10px;font-weight:800;color:#fff;background:#ea580c;border-radius:6px;padding:2px 6px;">手づまり</span>';
      line1.innerHTML=(THEME_EMOJI[rec.tileSet]||'🐙')+' '+badge+' <span style="color:#6b7280;font-weight:700;">TIME '+fmt(rec.timeSec)+' / SCORE '+rec.score+'</span>';
      var line2=document.createElement('div');
      line2.style.cssText='font-size:11px;color:#9aa6b6;font-weight:600;margin-top:2px;font-family:ui-monospace,Menlo,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      line2.textContent=fmtDate(rec.date)+'  ·  '+rec.code;
      info.appendChild(line1); info.appendChild(line2);
      var btn=document.createElement('button');
      btn.textContent='再挑戦';
      btn.style.cssText='border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;padding:8px 12px;border-radius:9px;background:#1f2937;color:#fff;white-space:nowrap;';
      btn.onclick=function(){ closeHistory(); startBoard({seed:rec.seed, theme:rec.tileSet, difficulty:rec.difficulty, C:rec.C, R:rec.R}); };
      row.appendChild(info); row.appendChild(btn);
      el.appendChild(row);
    });
  }
  function openHistory(){
    document.getElementById('hist-cur-code').textContent=encodeCode(st);
    document.getElementById('hist-code-err').style.display='none';
    document.getElementById('hist-code-input').value='';
    renderHistory();
    document.getElementById('history-overlay').style.display='flex';
  }
  function closeHistory(){ document.getElementById('history-overlay').style.display='none'; }
  function playFromCode(){
    var d=decodeCode(document.getElementById('hist-code-input').value);
    if(!d){ document.getElementById('hist-code-err').style.display='block'; return; }
    closeHistory();
    startBoard({seed:d.seed, theme:d.theme, difficulty:d.difficulty, C:d.C, R:d.R});
  }

  // ---- wiring ----
  document.getElementById('btn-hint').onclick=function(){ hint(); };
  document.getElementById('btn-new').onclick=function(){ newGame(); };
  document.getElementById('btn-again').onclick=function(){ newGame(); };
  document.getElementById('btn-win-share').onclick=function(){ shareBoard(); };
  document.getElementById('btn-over-new').onclick=function(){ newGame(); };
  document.getElementById('btn-history').onclick=function(){ openHistory(); };
  document.getElementById('btn-hist-close').onclick=function(){ closeHistory(); };
  document.getElementById('history-overlay').onclick=function(e){ if(e.target===this) closeHistory(); };
  document.getElementById('btn-code-play').onclick=function(){ playFromCode(); };
  document.getElementById('hist-code-input').onkeydown=function(e){ if(e.key==='Enter') playFromCode(); };
  document.getElementById('btn-code-copy').onclick=function(){
    var link=boardUrl(st), b=document.getElementById('btn-code-copy'), o=b.textContent;
    var done=function(){ b.textContent='コピー済'; setTimeout(function(){ b.textContent=o; },1200); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(done,done); }
    else { done(); }
  };
  function shareBoard(){
    var url=boardUrl(st);
    var text;
    if(st.status==='won'){ text='🐙 二タコ採りをクリア！ TIME '+fmt(st.timeSec)+' / SCORE '+st.score+' で全部採ったよ。同じ盤面に挑戦👇'; }
    else { text='🐙 海の生きものを二匹ずつ採る二角取りパズル「二タコ採り」。この盤面で遊ぼう👇'; }
    var intent='https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url)+'&hashtags='+encodeURIComponent('二タコ採り,TAKOTORI');
    window.open(intent,'_blank','noopener');
  }
  document.getElementById('btn-share').onclick=function(){ shareBoard(); };

  // ---- boot ----
  // 優先順位: URL の盤面(?b=) > 遊びかけの保存 > 新規（URLの?theme= か前回テーマ）。
  var urlBoard=readUrlBoard(), save=loadSave();
  if(urlBoard){
    var sameAsSave = save && save.seed===urlBoard.seed && save.tileSet===urlBoard.theme && save.C===urlBoard.C && save.R===urlBoard.R;
    st = (sameAsSave && restoreState(save)) || freshState(urlBoard.difficulty, urlBoard.theme, urlBoard.seed, {C:urlBoard.C, R:urlBoard.R});
  } else {
    st = restoreState(save) || freshState('all', readUrlTheme()||loadTheme());
  }
  syncUrl();
  applyLayoutMode();
  renderAll();
  _timer=setInterval(function(){ if(st.status==='playing'){ st.timeSec++; renderStats(); saveGame(); } },1000);
  window.addEventListener('resize',function(){ applyLayoutMode(); computeSize(); });
  // アプリ/タブが閉じられる直前にも保存（スマホ再起動対策）。
  window.addEventListener('pagehide',saveGame);
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden') saveGame(); });
  if(window.ResizeObserver){ _ro=new ResizeObserver(computeSize); _ro.observe(boardWrap); }
  setTimeout(function(){ applyLayoutMode(); computeSize(); },0);
})();
</script>
</body>
</html>
