<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>二タコ採り — TAKO TORI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box}
  body{-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%;overscroll-behavior:none}
  button{touch-action:manipulation}
  .app-root{min-height:100vh;min-height:-webkit-fill-available;min-height:100dvh}
  .controls{padding-bottom:max(18px,env(safe-area-inset-bottom)) !important}
  @media (max-width:480px){
    .hdr{padding:8px 10px 4px !important;gap:8px 10px !important}
    .brand-emoji{font-size:18px !important}
    .brand-title{font-size:18px !important}
    .brand-sub{display:none !important}
    .pill-group{padding:3px !important}
    .pill{padding:6px 10px !important;font-size:12px !important}
    .stat-row{gap:5px !important}
    .stat-card{min-width:0 !important;padding:4px 7px !important;border-radius:10px !important}
    .stat-label{font-size:9px !important;letter-spacing:.08em !important}
    .stat-val{font-size:15px !important}
  }
  @keyframes hintPulse{
    0%,100%{box-shadow:0 0 0 3px #0e7490,0 4px 10px rgba(0,0,0,.15);transform:translateY(0)}
    50%{box-shadow:0 0 0 6px #22b8cf,0 10px 20px rgba(14,116,144,.5);transform:translateY(-3px)}
  }
  @keyframes octoWobble{
    0%,100%{transform:translateY(-4px) rotate(0deg) scale(1,1)}
    25%{transform:translateY(-5px) rotate(-4deg) scale(1.04,.95)}
    50%{transform:translateY(-3px) rotate(0deg) scale(.96,1.05)}
    75%{transform:translateY(-5px) rotate(4deg) scale(1.04,.95)}
  }
  @keyframes inkPop{
    0%{transform:scale(1) rotate(0);opacity:1}
    35%{transform:scale(1.14) rotate(-9deg);opacity:1}
    100%{transform:scale(.08) rotate(22deg);opacity:0}
  }
  @keyframes inkSplat{
    0%{transform:scale(.2) rotate(0);opacity:0}
    30%{opacity:.9}
    100%{transform:scale(1.85) rotate(18deg);opacity:0}
  }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes overlayPop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes bannerIn{0%{transform:translateY(8px);opacity:0}100%{transform:translateY(0);opacity:1}}
  .ctl{border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;padding:11px 22px;border-radius:13px;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:transform .1s}
  .ctl:hover{transform:translateY(-2px)}
  .ctl-hint{background:#ffe6df;color:#c0432e}
  .ctl-hint:hover{background:#ffd4c9}
  .ctl-shuffle{background:#d6eef0;color:#0e6e7a}
  .ctl-shuffle:hover{background:#bfe5e8}
  .ctl-new{background:#1f2937;color:#fff}
  .ctl-new:hover{background:#374151}
</style>
</head>
<body>
<div class="app-root" style="width:100%;display:flex;flex-direction:column;font-family:'Zen Maru Gothic',system-ui,sans-serif;background:radial-gradient(120% 90% at 50% -10%,#f6fdfe 0%,#e3f3f5 55%,#d2eaec 100%);color:#1f2937;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);">

  <div class="hdr" style="display:flex;flex-wrap:wrap;align-items:center;gap:12px 16px;padding:16px 20px 8px;">
    <div style="display:flex;align-items:baseline;gap:9px;">
      <span class="brand-emoji" style="font-size:24px;line-height:1;animation:bob 2.6s ease-in-out infinite;">🐙</span>
      <span class="brand-title" style="font-size:26px;font-weight:900;letter-spacing:.04em;color:#1f2937;">二タコ採り</span>
      <span class="brand-sub" style="font-size:11px;font-weight:700;letter-spacing:.22em;color:#7fb6c2;">TAKO TORI</span>
    </div>
    <div id="theme-group" class="pill-group" style="display:flex;gap:3px;background:#eef1f6;padding:4px;border-radius:13px;"></div>
    <div id="diff-group" class="pill-group" style="display:flex;gap:3px;background:#eef1f6;padding:4px;border-radius:13px;"></div>
    <div id="fit-group" class="pill-group" style="display:flex;gap:3px;background:#eef1f6;padding:4px;border-radius:13px;"></div>
    <div style="flex:1;min-width:8px;"></div>
    <div class="stat-row" style="display:flex;gap:8px;flex-wrap:wrap;">
      <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:62px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
        <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">TIME</span>
        <span id="stat-time" class="stat-val" style="font-size:19px;font-weight:900;color:#1f2937;font-variant-numeric:tabular-nums;">00:00</span>
      </div>
      <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:70px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
        <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">SCORE</span>
        <span id="stat-score" class="stat-val" style="font-size:19px;font-weight:900;color:#1f2937;font-variant-numeric:tabular-nums;">0</span>
      </div>
      <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:58px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
        <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">COMBO</span>
        <span id="stat-combo" class="stat-val" style="font-size:19px;font-weight:900;color:#cbd3df;font-variant-numeric:tabular-nums;">—</span>
      </div>
      <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:58px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
        <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">残り</span>
        <span id="stat-pairs" class="stat-val" style="font-size:19px;font-weight:900;color:#1f2937;font-variant-numeric:tabular-nums;">0</span>
      </div>
      <div class="stat-card" style="display:flex;flex-direction:column;align-items:center;min-width:62px;background:#fff;border-radius:13px;padding:6px 12px;box-shadow:0 1px 3px rgba(20,30,60,.09);">
        <span class="stat-label" style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#9aa6b6;">BEST</span>
        <span id="stat-best" class="stat-val" style="font-size:19px;font-weight:900;color:#e0644d;font-variant-numeric:tabular-nums;">—</span>
      </div>
    </div>
  </div>

  <div id="boardWrap" style="flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:6px 12px;position:relative;">
    <div id="board"></div>
  </div>

  <div id="deadlock-wrap" style="display:none;justify-content:center;padding:0 16px 4px;">
    <div style="display:flex;align-items:center;gap:12px;background:#fff7ed;border:1.5px solid #fed7aa;color:#9a3412;font-weight:700;padding:9px 16px;border-radius:13px;box-shadow:0 4px 14px rgba(154,52,18,.12);animation:bannerIn .25s ease;">
      <span>タコに手が届かない！シャッフルしてみよう</span>
      <button id="deadlock-shuffle" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;background:#ea580c;color:#fff;padding:6px 14px;border-radius:9px;">シャッフル</button>
    </div>
  </div>

  <div class="controls" style="display:flex;gap:10px;justify-content:center;padding:10px 14px 18px;flex-wrap:wrap;">
    <button id="btn-hint" class="ctl ctl-hint">ヒント</button>
    <button id="btn-shuffle" class="ctl ctl-shuffle">シャッフル</button>
    <button id="btn-new" class="ctl ctl-new">新しいゲーム</button>
  </div>

  <div id="win-overlay" style="display:none;position:fixed;inset:0;z-index:60;align-items:center;justify-content:center;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);padding:20px;">
    <div style="background:#fff;border-radius:24px;padding:36px 40px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:overlayPop .35s cubic-bezier(.2,1.1,.3,1);max-width:340px;width:100%;">
      <div style="font-size:13px;font-weight:700;letter-spacing:.3em;color:#e0644d;">CLEAR</div>
      <div style="font-size:30px;font-weight:900;margin:6px 0 18px;color:#1f2937;">ぜんぶ採った！🐙</div>
      <div style="display:flex;justify-content:center;gap:28px;margin-bottom:8px;">
        <div><div style="font-size:11px;color:#9aa6b6;font-weight:700;letter-spacing:.1em;">TIME</div><div id="final-time" style="font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;">00:00</div></div>
        <div><div style="font-size:11px;color:#9aa6b6;font-weight:700;letter-spacing:.1em;">SCORE</div><div id="final-score" style="font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;">0</div></div>
      </div>
      <div id="final-best" style="font-size:13px;color:#6b7280;margin-bottom:22px;font-weight:500;">自己ベスト —</div>
      <button id="btn-again" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;padding:13px 30px;border-radius:14px;background:#1f2937;color:#fff;width:100%;">もう一度</button>
    </div>
  </div>

  <div id="over-overlay" style="display:none;position:fixed;inset:0;z-index:60;align-items:center;justify-content:center;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);padding:20px;">
    <div style="background:#fff;border-radius:24px;padding:36px 40px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:overlayPop .35s cubic-bezier(.2,1.1,.3,1);max-width:340px;width:100%;">
      <div style="font-size:13px;font-weight:700;letter-spacing:.3em;color:#ea580c;">GAME OVER</div>
      <div style="font-size:30px;font-weight:900;margin:6px 0 10px;color:#1f2937;">手づまり！🐙</div>
      <div style="font-size:14px;color:#6b7280;margin-bottom:22px;font-weight:500;">タコに手が届かなくなりました</div>
      <div style="display:flex;gap:10px;">
        <button id="btn-over-shuffle" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;padding:13px 0;border-radius:14px;background:#ea580c;color:#fff;flex:1;">シャッフル</button>
        <button id="btn-over-new" style="border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;padding:13px 0;border-radius:14px;background:#1f2937;color:#fff;flex:1;">新しいゲーム</button>
      </div>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  var props = { accentColor:'#f59e0b', comboSeconds:5 };

  // all=18x8(144,花牌あり) / std=17x8(136,花牌なし)
  var DIMS = { all:{C:18,R:8,flowers:true}, std:{C:17,R:8,flowers:false} };
  var _id = 1;
  var boardWrap = document.getElementById('boardWrap');
  var boardEl = document.getElementById('board');
  var st = null;
  var _timer = null, _hintTimer = null, _matchTimer = null, _ro = null;

  // ---- tile sets ----
  function buildTako(){
    var types=[
      {key:'tako',    main:'🐙', color:'#e05a4d', tint:'#fdecea'},
      {key:'ika',     main:'🦑', color:'#d98324', tint:'#fdf1e3'},
      {key:'kani',    main:'🦀', color:'#e0556b', tint:'#fdeaee'},
      {key:'ebi',     main:'🦐', color:'#e07a8a', tint:'#fdedf0'},
      {key:'lobster', main:'🦞', color:'#c0392b', tint:'#fbeae8'},
      {key:'fugu',    main:'🐡', color:'#d9a441', tint:'#fdf6e6'},
      {key:'tropi',   main:'🐠', color:'#2aa7c4', tint:'#e6f6fa'},
      {key:'sakana',  main:'🐟', color:'#2f7fd1', tint:'#e8f1fb'},
      {key:'kai',     main:'🐚', color:'#d98ba6', tint:'#fbeef3'},
      {key:'coral',   main:'🪸', color:'#e06a8a', tint:'#fdebf0'},
      {key:'kurage',  main:'🪼', color:'#8a7fd9', tint:'#efedfb'},
      {key:'kame',    main:'🐢', color:'#2e9e6b', tint:'#e7f6ee'},
      {key:'iruka',   main:'🐬', color:'#3aa0d6', tint:'#e7f3fb'},
      {key:'kujira',  main:'🐳', color:'#4a8fd1', tint:'#e9f1fb'},
      {key:'azarashi',main:'🦭', color:'#6b8aa6', tint:'#eef2f7'},
      {key:'same',    main:'🦈', color:'#5a7d99', tint:'#edf2f6'},
      {key:'rakko',   main:'🦦', color:'#a9743f', tint:'#f6ede2'}
    ].map(function(t){ return Object.assign({},t,{sub:'',honor:false,value:0,suit:t.key,pat:null}); });
    var flowers=[
      {key:'fl-ume', main:'🌸', color:'#e06a9a', tint:'#fdeaf2'},
      {key:'fl-ran', main:'🌺', color:'#d94f6e', tint:'#fdeaee'},
      {key:'fl-kiku',main:'🌼', color:'#d99a2a', tint:'#fdf4e0'},
      {key:'fl-hasu',main:'🪷', color:'#caa83a', tint:'#fbf6e3'}
    ].map(function(t){ return Object.assign({},t,{sub:'',honor:false,value:0,suit:t.key,flower:true,pat:null}); });
    return { types:types, flowers:flowers };
  }

  function buildMahjong(){
    var types=[];
    var suits=[
      {suit:'man',color:'#c0392b',pat:null, sub:'萬',tint:'#fdeceb',num:['','一','二','三','四','五','六','七','八','九']},
      {suit:'pin',color:'#1d4ed8',pat:'dot',sub:'筒',tint:'#e8eefb',num:[]},
      {suit:'sou',color:'#15803d',pat:'bar',sub:'索',tint:'#e7f5ec',num:[]}
    ];
    suits.forEach(function(s){ for(var v=1;v<=9;v++) types.push({key:s.suit+'-'+v,suit:s.suit,value:v,main:s.pat?'':s.num[v],sub:s.pat?'':s.sub,color:s.color,tint:s.tint,honor:false,pat:s.pat}); });
    var honors=[{ch:'東',c:'#3730a3'},{ch:'南',c:'#3730a3'},{ch:'西',c:'#3730a3'},{ch:'北',c:'#3730a3'},{ch:'中',c:'#c0392b'},{ch:'發',c:'#15803d'},{ch:'白',c:'#475569'}];
    honors.forEach(function(h,i){ types.push({key:'honor-'+i,suit:'honor',value:i,main:h.ch,sub:'',color:h.c,tint:'#eef1fb',honor:true,pat:(h.ch==='白'?'haku':null)}); });
    var flowers=[
      {key:'h-ume', main:'梅', sub:'花', color:'#c0392b', tint:'#fdeceb'},
      {key:'h-ran', main:'蘭', sub:'花', color:'#15803d', tint:'#e7f5ec'},
      {key:'h-take',main:'竹', sub:'花', color:'#0e7490', tint:'#e3f4f7'},
      {key:'h-kiku',main:'菊', sub:'花', color:'#d99a2a', tint:'#fdf4e0'}
    ].map(function(t){ return Object.assign({},t,{honor:false,value:0,suit:t.key,flower:true,pat:null}); });
    return { types:types, flowers:flowers };
  }

  var SETS = { tako:buildTako(), mahjong:buildMahjong() };

  // ---- state ----
  // 端末の向き。縦持ちなら盤面も縦長（列と行を入れ替え）にする。
  function isPortrait(){ return window.innerHeight >= window.innerWidth; }

  function freshState(diff, theme){
    var d=DIMS[diff], C=d.C, R=d.R, flowers=d.flowers;
    if(isPortrait()){ var tmp=C; C=R; R=tmp; }
    theme = theme || (st && st.tileSet) || 'tako';
    var set=SETS[theme];
    var grid=generateSolvable(C,R,flowers,set);
    return { difficulty:diff,tileSet:theme,C:C,R:R,grid:grid,selectedId:null,hintIds:[],removingIds:[],pathCells:[],score:0,combo:0,lastMatch:0,timeSec:0,status:'playing',deadlock:false,fit:(st?st.fit:loadFit()),tileSize:44,tileW:44,tileH:59,best:getBest(diff,theme),animating:false };
  }

  function loadTheme(){ try{ return localStorage.getItem('nitako_theme')||'tako'; }catch(e){ return 'tako'; } }
  function saveTheme(t){ try{ localStorage.setItem('nitako_theme',t); }catch(e){} }
  function loadFit(){ try{ return localStorage.getItem('nitako_fit')!=='0'; }catch(e){ return true; } }
  function saveFit(v){ try{ localStorage.setItem('nitako_fit',v?'1':'0'); }catch(e){} }
  function getBest(diff,theme){ try{ var v=localStorage.getItem('nitako_best_'+theme+'_'+diff); return v?parseInt(v,10):null; }catch(e){ return null; } }
  function setBest(diff,theme,sec){ try{ localStorage.setItem('nitako_best_'+theme+'_'+diff,String(sec)); }catch(e){} }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

  function randomFill(C,R,flowers,set){
    var positions=[];
    for(var r=1;r<=R;r++) for(var c=1;c<=C;c++) positions.push({r:r,c:c});
    shuffle(positions);
    var N=positions.length;
    var pairsNeeded=N/2;
    var bag=[];
    if(flowers){ set.flowers.forEach(function(f){ bag.push(f,f); }); pairsNeeded-=set.flowers.length; }
    var order=shuffle(set.types.slice());
    for(var i=0;i<pairsNeeded;i++){ var t=order[i%order.length]; bag.push(t,t); }
    shuffle(bag);
    var grid=[]; for(var rr=0;rr<R+2;rr++) grid.push(new Array(C+2).fill(null));
    positions.forEach(function(p,idx){ grid[p.r][p.c]=Object.assign({},bag[idx],{id:_id++}); });
    return grid;
  }

  function generateSolvable(C,R,flowers,set){
    var last=null;
    for(var a=0;a<16;a++){
      var g=randomFill(C,R,flowers,set); last=g;
      if(findAnyMove(g,C,R)) return g;
    }
    return last;
  }

  function isEmpty(grid,C,R,r,c){ return r>=0&&r<=R+1&&c>=0&&c<=C+1&&!grid[r][c]; }
  function betweenClear(grid,a,b){
    if(a.r===b.r){ var lo=Math.min(a.c,b.c),hi=Math.max(a.c,b.c); for(var c=lo+1;c<hi;c++) if(grid[a.r][c]) return false; return true; }
    if(a.c===b.c){ var lo2=Math.min(a.r,b.r),hi2=Math.max(a.r,b.r); for(var r=lo2+1;r<hi2;r++) if(grid[r][a.c]) return false; return true; }
    return false;
  }
  function connectPath(grid,C,R,a,b){
    if((a.r===b.r||a.c===b.c) && betweenClear(grid,a,b)) return [a,b];
    var k1={r:a.r,c:b.c}, k2={r:b.r,c:a.c};
    if(isEmpty(grid,C,R,k1.r,k1.c) && betweenClear(grid,a,k1) && betweenClear(grid,k1,b)) return [a,k1,b];
    if(isEmpty(grid,C,R,k2.r,k2.c) && betweenClear(grid,a,k2) && betweenClear(grid,k2,b)) return [a,k2,b];
    for(var rr=0;rr<=R+1;rr++){
      var c1={r:rr,c:a.c}, c2={r:rr,c:b.c};
      if(isEmpty(grid,C,R,c1.r,c1.c) && isEmpty(grid,C,R,c2.r,c2.c)
        && betweenClear(grid,a,c1) && betweenClear(grid,c1,c2) && betweenClear(grid,c2,b)) return [a,c1,c2,b];
    }
    for(var cc=0;cc<=C+1;cc++){
      var d1={r:a.r,c:cc}, d2={r:b.r,c:cc};
      if(isEmpty(grid,C,R,d1.r,d1.c) && isEmpty(grid,C,R,d2.r,d2.c)
        && betweenClear(grid,a,d1) && betweenClear(grid,d1,d2) && betweenClear(grid,d2,b)) return [a,d1,d2,b];
    }
    return null;
  }

  function findAnyMove(grid,C,R){
    var groups={};
    for(var r=1;r<=R;r++) for(var c=1;c<=C;c++){ var t=grid[r][c]; if(t){ (groups[t.key]||(groups[t.key]=[])).push({r:r,c:c}); } }
    for(var key in groups){
      var arr=groups[key];
      for(var i=0;i<arr.length;i++) for(var j=i+1;j<arr.length;j++){
        var path=connectPath(grid,C,R,arr[i],arr[j]);
        if(path) return {a:arr[i],b:arr[j],path:path,id1:grid[arr[i].r][arr[i].c].id,id2:grid[arr[j].r][arr[j].c].id};
      }
    }
    return null;
  }

  function findTilePos(id){ for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++){ if(st.grid[r][c]&&st.grid[r][c].id===id) return {r:r,c:c}; } return null; }

  // ---- interaction ----
  function onTile(id){
    if(st.status!=='playing'||st.animating) return;
    if(st.selectedId==null){ st.selectedId=id; st.hintIds=[]; renderBoard(); return; }
    if(st.selectedId===id){ st.selectedId=null; renderBoard(); return; }
    var a=findTilePos(st.selectedId), b=findTilePos(id);
    if(!a||!b){ st.selectedId=id; renderBoard(); return; }
    var ta=st.grid[a.r][a.c], tb=st.grid[b.r][b.c];
    if(ta.key===tb.key){
      var path=connectPath(st.grid,st.C,st.R,a,b);
      if(path){ doMatch(a,b,path,id,st.selectedId); return; }
    }
    st.selectedId=id; renderBoard();
  }

  function doMatch(a,b,path,idB,idA){
    var win=(props.comboSeconds!=null?props.comboSeconds:5)*1000;
    var now=Date.now();
    var combo=(now-st.lastMatch<=win && st.combo>0)?st.combo+1:1;
    st.pathCells=path; st.removingIds=[idA,idB]; st.selectedId=null; st.animating=true;
    st.combo=combo; st.lastMatch=now; st.score=st.score+100*combo; st.hintIds=[];
    renderBoard(); renderStats();
    _matchTimer=setTimeout(function(){
      var grid=st.grid.map(function(row){ return row.slice(); });
      grid[a.r][a.c]=null; grid[b.r][b.c]=null;
      var remaining=0; grid.forEach(function(row){ row.forEach(function(c){ if(c) remaining++; }); });
      var won=remaining===0;
      var deadlock=!won && !findAnyMove(grid,st.C,st.R);
      st.grid=grid; st.removingIds=[]; st.pathCells=[]; st.animating=false; st.deadlock=deadlock;
      if(won){ st.status='won'; if(st.best==null||st.timeSec<st.best){ setBest(st.difficulty,st.tileSet,st.timeSec); st.best=st.timeSec; } }
      renderBoard(); renderStats(); renderBanners();
    },420);
  }

  function hint(){
    if(st.status!=='playing'||st.animating) return;
    var m=findAnyMove(st.grid,st.C,st.R);
    if(m){
      st.hintIds=[m.id1,m.id2]; st.score=Math.max(0,st.score-20);
      renderBoard(); renderStats();
      _hintTimer=setTimeout(function(){ if(st.hintIds.length){ st.hintIds=[]; renderBoard(); } },1800);
    } else { st.deadlock=true; renderBanners(); }
  }

  function shuffleBoard(){
    if(st.status!=='playing'||st.animating) return;
    var grid;
    for(var attempt=0;attempt<80;attempt++){
      var positions=[],tiles=[];
      for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++){ var t=st.grid[r][c]; if(t){ positions.push({r:r,c:c}); tiles.push(t); } }
      shuffle(tiles);
      grid=[]; for(var rr=0;rr<st.R+2;rr++) grid.push(new Array(st.C+2).fill(null));
      positions.forEach(function(p,i){ grid[p.r][p.c]=tiles[i]; });
      if(findAnyMove(grid,st.C,st.R)) break;
    }
    st.grid=grid; st.selectedId=null; st.hintIds=[]; st.combo=0; st.deadlock=false;
    renderBoard(); renderStats(); renderBanners();
  }

  function newGame(diff){
    if(_matchTimer) clearTimeout(_matchTimer);
    if(_hintTimer) clearTimeout(_hintTimer);
    var d=diff||st.difficulty;
    st=freshState(d, st.tileSet);
    renderModes(); renderBanners();
    setTimeout(function(){ computeSize(); renderAll(); },0);
  }
  function setDifficulty(d){ if(d!==st.difficulty) newGame(d); }
  function setTheme(t){
    if(t===st.tileSet) return;
    saveTheme(t);
    if(_matchTimer) clearTimeout(_matchTimer);
    if(_hintTimer) clearTimeout(_hintTimer);
    st=freshState(st.difficulty, t);
    renderModes(); renderBanners();
    setTimeout(function(){ computeSize(); renderAll(); },0);
  }
  function setFit(v){
    if(v===st.fit) return;
    st.fit=v; saveFit(v);
    renderModes();
    computeSize(); renderBoard();
  }

  // ---- sizing ----
  function computeSize(){
    if(!boardWrap) return;
    // 盤の内側に確保できる実寸（boardWrapはflex:1で残り高さを保持）
    var w=boardWrap.clientWidth-24;
    var availH=Math.max(160,boardWrap.clientHeight-12);
    var C=st.C,R=st.R,tw,th;
    if(st.fit){
      // 画面いっぱい: 横と縦のセルサイズを独立に決めて隙間をなくす
      tw=Math.max(12,Math.floor(w/(C+2)));
      th=Math.max(12,Math.floor(availH/(R+2)));
    } else {
      // 従来: タイル比率1.34固定・上限50px。幅制約を優先しはみ出しを防ぐ。
      var ts0=Math.max(12,Math.min(50,Math.floor(Math.min(w/(C+2),(availH/(R+2))/1.34))));
      tw=ts0; th=Math.round(ts0*1.34);
    }
    if(tw!==st.tileW||th!==st.tileH){ st.tileW=tw; st.tileH=th; st.tileSize=Math.min(tw,th); renderBoard(); }
  }

  function fmt(s){ var m=Math.floor(s/60),ss=s%60; return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; }
  function pillStyle(active){ return {border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:'13.5px',padding:'8px 14px',borderRadius:'10px',background:active?'#1f2937':'transparent',color:active?'#fff':'#67748a',transition:'all .15s'}; }

  // ---- mahjong pip helpers ----
  function pipColors(pat,n){
    var B='#1d56c0', G='#1f9a4f', R='#c0392b', a;
    if(pat==='dot'){
      a=new Array(n).fill(B);
      if(n===2){a[0]=G;a[1]=B;}
      else if(n===3){a[0]=B;a[1]=R;a[2]=G;}
      else if(n===4){a[0]=G;a[1]=B;a[2]=B;a[3]=G;}
      else if(n===5){a[0]=B;a[1]=B;a[2]=R;a[3]=G;a[4]=G;}
      else if(n===6){a[0]=G;a[1]=G;a[2]=G;a[3]=B;a[4]=B;a[5]=B;}
      else if(n===7){a[0]=R;a[1]=R;a[2]=R;a[3]=G;a[4]=G;a[5]=G;a[6]=G;}
      else if(n===8){a.fill(B);}
      else if(n===9){a[0]=B;a[1]=B;a[2]=B;a[3]=R;a[4]=R;a[5]=R;a[6]=G;a[7]=G;a[8]=G;}
      return a;
    }
    a=new Array(n).fill(G);
    if(n===5){a[2]=R;}
    else if(n===6){a[4]=B;a[5]=B;}
    else if(n===7){a[0]=R;}
    else if(n===9){a[0]=R;a[1]=R;a[2]=R;a[6]=B;a[7]=B;a[8]=B;}
    return a;
  }
  function pipLayout(n){
    var L={
      1:[[50,50]],
      2:[[50,27],[50,73]],
      3:[[24,20],[50,50],[76,80]],
      4:[[30,30],[70,30],[30,70],[70,70]],
      5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
      6:[[30,21],[70,21],[30,50],[70,50],[30,79],[70,79]],
      7:[[26,13],[50,20],[74,27],[33,58],[67,58],[33,84],[67,84]],
      8:[[32,14],[68,14],[32,38],[68,38],[32,62],[68,62],[32,86],[68,86]],
      9:[[20,20],[50,20],[80,20],[20,50],[50,50],[80,50],[20,80],[50,80],[80,80]]
    };
    return L[n]||L[1];
  }
  // 索（バー）専用レイアウト。3/7/8 の並びと8の回転がドットと異なる。
  function pipLayoutSou(n){
    var L={
      1:[[50,50]],
      2:[[50,20],[50,80]],
      3:[[50,21],[34,73],[66,73]],
      4:[[24,24],[76,24],[24,76],[76,76]],
      5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
      6:[[20,15],[80,15],[20,50],[80,50],[20,85],[80,85]],
      7:[[50,13],[29,49],[50,49],[71,49],[29,81],[50,81],[71,81]],
      8:[[43,24,-42],[57,24,42],[43,36,42],[57,36,-42],[43,64,-42],[57,64,42],[43,76,42],[57,76,-42]],
      9:[[20,20],[50,20],[80,20],[20,50],[50,50],[80,50],[20,80],[50,80],[80,80]]
    };
    return L[n]||L[1];
  }

  function renderStats(){
    var remaining=0; for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++) if(st.grid[r][c]) remaining++;
    var pairs=Math.ceil(remaining/2);
    var comboActive=st.combo>=2;
    document.getElementById('stat-time').textContent=fmt(st.timeSec);
    document.getElementById('stat-score').textContent=st.score;
    document.getElementById('stat-pairs').textContent=pairs;
    document.getElementById('stat-best').textContent=st.best!=null?fmt(st.best):'—';
    var comboEl=document.getElementById('stat-combo');
    comboEl.textContent=comboActive?('×'+st.combo):'—';
    comboEl.style.color=comboActive?'#e0644d':'#cbd3df';
  }

  function buildPips(patWrap, t, ts, side){

        +"<path d='M20 46 Q20 12 50 12 Q80 12 80 46' fill='none' stroke='%23146e38' stroke-width='2' opacity='.4'/>"

      patWrap.appendChild(sp);
    } else if(n===8){
      // 八索：竹の結びを SVG で表現。
      var knot="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>"
        +"<g fill='%232fae5a' stroke='%23147a37' stroke-width='0.8'>"

  function renderBoard(){
    var tw=st.tileW, th=st.tileH, ts=st.tileSize, gap=Math.max(1,Math.round(ts*0.06));
    var sel=st.selectedId, hint=new Set(st.hintIds), rem=new Set(st.removingIds);
    var isEmoji=st.tileSet==='tako';
    boardEl.innerHTML='';
    Object.assign(boardEl.style,{position:'relative',width:((st.C+2)*tw)+'px',height:((st.R+2)*th)+'px',margin:'0 auto',background:'rgba(255,255,255,.4)',borderRadius:Math.round(ts*0.22)+'px',boxShadow:'inset 0 0 0 1px rgba(120,135,160,.18)'});

    for(var r=1;r<=st.R;r++) for(var c=1;c<=st.C;c++){
      var t=st.grid[r][c]; if(!t) continue;
      var isSel=t.id===sel, isHint=hint.has(t.id), isRem=rem.has(t.id);
      var rad=Math.round(ts*0.16);
      var pad=Math.max(2,Math.round(ts*0.07));

      var btn=document.createElement('button');

      var line=document.createElementNS(svgNS,'polyline');
      line.setAttribute('points',pathStr); line.setAttribute('fill','none'); line.setAttribute('stroke',props.accentColor||'#2b5563');
      line.setAttribute('stroke-width',strokeW); line.setAttribute('stroke-linejoin','round'); line.setAttribute('stroke-linecap','round');
      svg.appendChild(halo); svg.appendChild(line);
      boardEl.appendChild(svg);
    }
  }

  function renderBanners(){
    var isOver=st.deadlock&&st.status==='playing';
    document.getElementById('deadlock-wrap').style.display='none';
    document.getElementById('over-overlay').style.display=isOver?'flex':'none';
    var overlay=document.getElementById('win-overlay');
    if(st.status==='won'){
      overlay.style.display='flex';
      document.getElementById('final-time').textContent=fmt(st.timeSec);
      document.getElementById('final-score').textContent=st.score;
      document.getElementById('final-best').textContent='自己ベスト '+(st.best!=null?fmt(st.best):'—');
    } else {
      overlay.style.display='none';
    }
  }

  function renderAll(){ renderModes(); renderBoard(); renderStats(); renderBanners(); }

  // ---- wiring ----
  document.getElementById('btn-hint').onclick=function(){ hint(); };
  document.getElementById('btn-shuffle').onclick=function(){ shuffleBoard(); };
  document.getElementById('btn-new').onclick=function(){ newGame(); };
  document.getElementById('btn-again').onclick=function(){ newGame(); };
  document.getElementById('deadlock-shuffle').onclick=function(){ shuffleBoard(); };
  document.getElementById('btn-over-shuffle').onclick=function(){ shuffleBoard(); };
  document.getElementById('btn-over-new').onclick=function(){ newGame(); };

  // ---- boot ----
  st=freshState('std', loadTheme());
  renderAll();
  _timer=setInterval(function(){ if(st.status==='playing'){ st.timeSec++; renderStats(); } },1000);
  window.addEventListener('resize',computeSize);
  if(window.ResizeObserver){ _ro=new ResizeObserver(computeSize); _ro.observe(boardWrap); }
  setTimeout(computeSize,0);
})();
</script>
</body>
</html>
